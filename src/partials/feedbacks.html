<section class="feedbacks" id="feedbacks">
  <div class="container">
    <svg class="feedbacks-decoration" width="300" height="21">
      <use href="/icons/symbol.svg#icon-decoration"></use>
    </svg>
    <h2 class="feedbacks-title">Words from Our Wonderful Couples</h2>
    <p class="feedbacks-subtitle">
      Read what the couples who entrusted us with their most precious memories
      have to say.
    </p>
    <div class="feedbacks-slider swiper">
      <ul class="feedbacks-list swiper-wrapper">
        <!-- render feedbacks -->
      </ul>
    </div>
    <div class="feedbacks-controls">
      <div class="feedbacks-pagination swiper-pagination">
        <!-- pagination -->
      </div>
      <div class="feedbacks-buttons">
        <button
          type="button"
          class="feedbacks-btn feedbacks-btn-prev"
          aria-label="Previous feedback"
        >
          <svg class="icon" width="24" height="24">
            <use href="/icons/symbol.svg#icon-arrow_back"></use>
          </svg>
        </button>
        <button
          type="button"
          class="feedbacks-btn feedbacks-btn-next"
          aria-label="Next feedback"
        >
          <svg class="icon" width="24" height="24">
            <use href="/icons/symbol.svg#icon-arrow_forward"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
