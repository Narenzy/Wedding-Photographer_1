<div class="success-modal is-hidden" id="success-modal">
  <div class="modal-window">
    <button type="button" class="modal-close-btn" aria-label="Close modal">
      <svg class="modal-icon-close" width="24" height="24" aria-hidden="true">
        <use href="/icons/symbol.svg#icon-close"></use>
      </svg>
    </button>
    <h2 class="modal-title">Thank You for Your Inquiry!</h2>
    <picture>
      <source
        media="(min-width: 768px)"
        srcset="
          /img/tablet-desktop-modal-1x.webp 1x,
          /img/tablet-desktop-modal-2x.webp 2x
        "
        type="image/webp"
      />
      <img
        class="modal-image"
        src="/img/mobile-modal-1x.webp"
        srcset="/img/mobile-modal-1x.webp 1x, /img/mobile-modal-2x.webp 2x"
        alt="Wedding photos, invitation card and coffee cup"
        width="295"
        height="207"
      />
    </picture>
    <p class="modal-paragraph">
      I have received your message and I'm so excited about your interest! I
      will get in touch with you within 24-48 hours to discuss the details of
      your wedding day. In the meantime, feel free to browse my portfolio or
      follow me on Instagram for more inspiration.
    </p>
  </div>
</div>
